<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipbook Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body {
  margin: 0;
  background: #111;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#viewer {
  width: 90vw;
  height: 80vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background: #222;
  border-radius: 10px;
  margin-top: 20px;
}

canvas {
  max-width: 100%;
  max-height: 100%;
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
  border-radius: 6px;
}

.controls {
  margin: 15px;
}

button {
  padding: 10px 18px;
  margin: 0 5px;
  border: none;
  background: #ffcc00;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="viewer">
  <canvas id="pdf-canvas"></canvas>
</div>

<div class="controls">
  <button onclick="prevPage()">Prev</button>
  <button onclick="nextPage()">Next</button>
  <button onclick="downloadPDF()">Download</button>
</div>

<script>
const url = "sample.pdf";

let pdfDoc = null,
    pageNum = 1,
    canvas = document.getElementById('pdf-canvas'),
    ctx = canvas.getContext('2d');

// Load PDF
pdfjsLib.getDocument(url).promise.then(function(pdf) {
  pdfDoc = pdf;
  renderPage(pageNum);
});

// Render page
function renderPage(num) {
  pdfDoc.getPage(num).then(function(page) {
    const viewport = page.getViewport({ scale: 1.5 });
    canvas.height = viewport.height;
    canvas.width = viewport.width;

    const renderContext = {
      canvasContext: ctx,
      viewport: viewport
    };

    page.render(renderContext);
  });
}

// Controls
function nextPage() {
  if (pageNum >= pdfDoc.numPages) return;
  pageNum++;
  renderPage(pageNum);
}

function prevPage() {
  if (pageNum <= 1) return;
  pageNum--;
  renderPage(pageNum);
}

// Download
function downloadPDF() {
  const link = document.createElement("a");
  link.href = url;
  link.download = "file.pdf";
  link.click();
}

// Auto download (safe delay)
window.onload = () => {
  setTimeout(downloadPDF, 1500);
};
</script>

</body>
</html>
