<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flipbook Viewer</title>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <!-- Flipbook Viewer -->
  <script src="https://unpkg.com/flipbook-viewer/dist/flipbook.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    #flipbook {
      width: 90vw;
      height: 80vh;
      background: #222;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .controls {
      margin-top: 12px;
    }

    button {
      padding: 10px 18px;
      margin: 0 5px;
      border: none;
      border-radius: 6px;
      background: #ffcc00;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #ffaa00;
    }
  </style>
</head>

<body>

<div id="flipbook"></div>

<div class="controls">
  <button onclick="downloadPDF()">Download PDF</button>
</div>

<script>
  const pdfUrl = "sample.pdf"; // 👈 your PDF file

  // ✅ Auto download on load
  window.addEventListener("load", () => {
    setTimeout(() => {
      const link = document.createElement("a");
      link.href = pdfUrl;
      link.download = pdfUrl;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }, 1000); // delay helps avoid browser blocking
  });

  // ✅ Manual download button
  function downloadPDF() {
    const link = document.createElement("a");
    link.href = pdfUrl;
    link.download = pdfUrl;
    link.click();
  }

  // ✅ Fix: Load PDF properly (prevents default viewer issue)
  fetch(pdfUrl)
    .then(res => res.blob())
    .then(blob => {
      const fileURL = URL.createObjectURL(blob);

      const flipbook = new FlipbookViewer({
        container: document.getElementById("flipbook"),
        pdf: fileURL,
        width: "100%",
        height: "100%",
        singlePage: false,
        showCover: true,
        shadow: true
      });

      flipbook.init();
    })
    .catch(err => {
      console.error("Error loading PDF:", err);
    });

</script>

</body>
</html>
